<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Sereno Park & Café</title>

        <meta name="description" content="Sereno Park & Café Menu" />
        <link rel="icon" type="image/png" href="img/favicon.png" />

        <link rel="stylesheet" href="css/default.css" />
        <!-- Google tag (gtag.js) -->
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-XNQ6TXQ0K0"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag('js', new Date());

            gtag('config', 'G-XNQ6TXQ0K0');
        </script>
    </head>

    <body>
        <header class="hero">
            <div class="hero__content">
                <h1 class="hero__title">SERENO</h1>

                <p class="hero__subtitle">Park & Café</p>

                <div class="hero__divider">
                    <!--
                        Leaf icon: Lucide Icons (lucide.dev), Apache 2.0 license.
                        Paths designed for 24x24. Translated to sit at center of a 120x26 viewBox.
                    -->
                    <svg
                        class="hero__divider-svg"
                        viewBox="0 0 120 26"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <line
                            x1="0"
                            y1="13"
                            x2="46"
                            y2="13"
                            stroke="currentColor"
                            stroke-width="1" />
                        <g
                            transform="translate(48, 1)"
                            stroke="currentColor"
                            stroke-width="1.75"
                            stroke-linecap="round"
                            stroke-linejoin="round">
                            <path
                                d="M11 20A7 7 0 0 1 9.8 6.1C15.25 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z" />
                            <path d="M2 21c0-3 1.85-5.36 5.08-6" />
                        </g>
                        <line
                            x1="74"
                            y1="13"
                            x2="120"
                            y2="13"
                            stroke="currentColor"
                            stroke-width="1" />
                    </svg>
                </div>
            </div>
        </header>

        <nav id="menu-nav" class="menu-nav" aria-label="Menu Sections">
            <div id="menu-nav-list" class="menu-nav__list">
                <!-- Generated by JavaScript -->
            </div>
        </nav>

        <main id="menu" class="menu" aria-live="polite">
            <div class="loading">Loading menu...</div>
        </main>

        <footer class="footer">
            <p id="footer-text"></p>
        </footer>

        <template id="section-template">
            <section class="menu-section">
                <header class="menu-section__header">
                    <div class="menu-section__icon-container">
                        <!-- SVG loaded dynamically -->
                    </div>
                    <h2 class="menu-section__title"></h2>
                    <div class="menu-section__line"></div>
                </header>

                <div class="menu-items"></div>
            </section>
        </template>

        <template id="item-template">
            <article class="menu-item">
                <div class="menu-item__header">
                    <h3 class="menu-item__name"></h3>
                    <div class="menu-item__dots"></div>
                    <div class="menu-item__price"></div>
                </div>
                <p class="menu-item__description"></p>
            </article>
        </template>

        <script src="js/menu.js"></script>
        <script src="js/main.js" defer></script>
    </body>
</html>
